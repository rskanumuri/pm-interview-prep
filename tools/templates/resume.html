<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — Resume</title>
<style>
  /*
    Typography is driven by the user's resume_prefs.json (see /cv-gen).
    Only BODY size is user-chosen. All headings scale via em multipliers.
    Do not hard-code heading sizes. The skill injects:
      {{FONT_FACE_IMPORTS}} — @font-face or @import for web fonts (empty for system fonts)
      {{FONT_STACK}}        — e.g. "Calibri", "Helvetica Neue", Arial, sans-serif
      {{BODY_SIZE}}         — e.g. 10px, 11px
  */
  {{FONT_FACE_IMPORTS}}

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: {{FONT_STACK}};
    font-size: {{BODY_SIZE}};
    line-height: 1.5;
    color: #1a1a2e;
    background: #ffffff;
    padding: 0;
    margin: 0;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
    padding: 0;
  }

  /* === HEADER === */
  .header {
    margin-bottom: 14px;
    text-align: center;
  }

  .header h1 {
    font-family: inherit;
    font-size: 2.2em; /* scales with body */
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }

  .header-gradient {
    height: 2px;
    background: linear-gradient(to right, hsl(187, 74%, 32%), hsl(270, 70%, 45%));
    border-radius: 1px;
    margin-bottom: 8px;
  }

  .contact-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px 14px;
    font-family: inherit;
    font-size: 0.9em;
    color: #555;
  }

  .contact-row a {
    color: #555;
    text-decoration: none;
  }

  .contact-row .separator {
    color: #ccc;
  }

  /* === SECTIONS === */
  .section {
    margin-bottom: 12px;
  }

  .section-title {
    font-family: inherit;
    font-size: 1.2em;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: hsl(187, 74%, 32%);
    border-bottom: 1px solid #e5e5e5;
    padding-bottom: 3px;
    margin-bottom: 7px;
    text-align: center;
  }

  /* Prevent single-word widows without hurting readability.
     text-wrap: pretty lands evenly-balanced line breaks.
     Supported in modern Chromium/WebKit/Gecko; graceful fallback otherwise. */
  .summary-text,
  .job li,
  .skills-line,
  .skill-item,
  .edu-item,
  .project-desc {
    text-wrap: pretty;
    hyphens: none;
  }

  /* === SUMMARY === */
  .summary-text {
    font-size: 1em;
    line-height: 1.55;
    color: #333;
  }

  a {
    white-space: nowrap;
  }

  /* === CORE COMPETENCIES === */
  .competencies-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .competency-tag {
    font-family: inherit;
    font-size: 1em;
    font-weight: 500;
    color: hsl(187, 74%, 28%);
    background: hsl(187, 40%, 95%);
    padding: 3px 9px;
    border-radius: 3px;
    border: 1px solid hsl(187, 40%, 88%);
  }

  /* === WORK EXPERIENCE === */
  .job {
    margin-bottom: 10px;
  }

  /* Single-line job header. All elements same size as body.
     Company bolded for emphasis; role/location inline after. Period right-aligned. */
  .job-line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    font-size: 1em;
    margin-bottom: 2px;
  }

  .job-details {
    flex: 1;
    font-size: 1em;
    color: #333;
  }

  .job-details strong {
    font-weight: 700;
    color: #1a1a2e;
  }

  .job-period {
    font-size: 1em;
    color: #555;
    white-space: nowrap;
  }

  .job ul {
    padding-left: 14px;
    margin-top: 2px;
  }

  .job li {
    font-size: 1em;
    line-height: 1.45;
    color: #333;
    margin-bottom: 2px;
  }

  .job li strong {
    font-weight: 700;
  }

  /* === PROJECTS === */
  .project {
    margin-bottom: 10px;
  }

  .project-title {
    font-family: inherit;
    font-size: 1.05em;
    font-weight: 700;
    color: hsl(270, 70%, 45%);
  }

  .project-badge {
    font-size: 0.85em;
    font-weight: 500;
    color: hsl(187, 74%, 32%);
    background: hsl(187, 40%, 95%);
    padding: 1px 6px;
    border-radius: 2px;
    margin-left: 6px;
  }

  .project-desc {
    font-size: 1em;
    color: #444;
    margin-top: 2px;
  }

  .project-tech {
    font-size: 0.9em;
    color: #888;
    margin-top: 2px;
  }

  /* === EDUCATION === */
  .edu-item {
    margin-bottom: 4px;
    font-size: 1em;
  }

  .edu-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .edu-title {
    font-weight: 600;
    color: #333;
  }

  .edu-org {
    color: hsl(270, 70%, 45%);
    font-weight: 700;
  }

  .edu-year {
    font-size: 0.9em;
    color: #777;
  }

  .edu-desc {
    font-size: 0.9em;
    color: #666;
  }

  /* === CERTIFICATIONS === */
  .cert-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
  }

  .cert-title {
    font-size: 1em;
    font-weight: 500;
    color: #333;
  }

  .cert-org {
    color: hsl(270, 70%, 45%);
  }

  .cert-year {
    font-size: 0.9em;
    color: #777;
  }

  /* === SKILLS === */
  .skills-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 10px;
  }

  .skill-item {
    font-size: 1em;
    color: #444;
  }

  .skill-category {
    font-weight: 700;
    color: #333;
    font-size: 1em;
  }

  .skills-line {
    font-size: 1em;
    color: #333;
    line-height: 1.55;
  }

  /* === PRINT === */
  @media print {
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .page {
      padding: 0;
    }
  }

  .avoid-break {
    break-inside: avoid;
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="header-gradient"></div>
    <div class="contact-row">
      {{CONTACT_ROW}}
    </div>
  </div>

  <!-- PROFESSIONAL SUMMARY -->
  <div class="section">
    <div class="section-title">Summary</div>
    <div class="summary-text">{{SUMMARY_TEXT}}</div>
  </div>

  <!-- CORE COMPETENCIES (optional; skill omits if empty) -->
  {{COMPETENCIES_SECTION}}

  <!-- WORK EXPERIENCE -->
  <div class="section">
    <div class="section-title">Experience</div>
    {{EXPERIENCE}}
  </div>

  <!-- PROJECTS (optional; skill omits if empty) -->
  {{PROJECTS_SECTION}}

  <!-- EDUCATION -->
  <div class="section avoid-break">
    <div class="section-title">Education</div>
    {{EDUCATION}}
  </div>

  <!-- SKILLS -->
  <div class="section avoid-break">
    <div class="section-title">Skills</div>
    {{SKILLS}}
  </div>

</div>
</body>
</html>
